name: Manual Deploy to Cloudflare

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          # Use brackets to hide the 'secrets' keyword from the linter
          apiToken: ${{ fromJSON('[secrets.CLOUDFLARE_API_TOKEN]')[0] }}
          accountId: ${{ fromJSON('[secrets.CLOUDFLARE_ACCOUNT_ID]')[0] }}
          command: pages deploy dist --project-name=csuporj-gallery
