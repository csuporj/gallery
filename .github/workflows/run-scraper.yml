name: Gallery Auto-Update Scraper

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: deployment-lock
  cancel-in-progress: false

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Gallery
        uses: actions/checkout@v6
        with:
          path: ./gallery-dir

      - name: Checkout Scraper
        uses: actions/checkout@v6
        with:
          repository: csuporj/scraper
          path: ./scraper-dir

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run Scraper
        working-directory: ./gallery-dir
        run: |
          dotnet run --project ../scraper-dir/scraper/scraper.csproj

      - name: Commit and Push
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: ./gallery-dir
          commit_message: "Auto-update: New thumbnails and albums.json"
          file_pattern: "src/albums.json public/**/*.jpg"

      - name: Setup Node
        if: steps.auto-commit.outputs.changes_detected == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build React App
        if: steps.auto-commit.outputs.changes_detected == 'true'
        working-directory: ./gallery-dir
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.auto-commit.outputs.changes_detected == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./gallery-dir
          command: pages deploy dist --project-name=csuporj-gallery
