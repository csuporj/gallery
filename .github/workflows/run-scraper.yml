name: Gallery Auto-Update Scraper

on:
  schedule:
    - cron: "0 0 * * *"

  # Allows you to trigger it manually from the Actions tab
  workflow_dispatch:

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Gallery
        uses: actions/checkout@v6
        with:
          path: gallery-dir

      - name: Checkout Scraper
        uses: actions/checkout@v6
        with:
          repository: csuporj/scraper
          path: scraper-dir

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run Scraper
        working-directory: ./gallery-dir
        run: |
          dotnet run --project ../scraper-dir/scraper/scraper.csproj

      - name: Commit and Push
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: gallery-dir
          commit_message: "Auto-update: New thumbnails and albums.json"
          file_pattern: "src/albums.json public/**/*.jpg"

      - name: Build React App
        if: steps.auto-commit.outputs.changes_detected == 'true'
        working-directory: ./gallery-dir
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        if: steps.auto-commit.outputs.changes_detected == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Vite puts the final website in 'dist'
          publish_dir: ./gallery-dir/dist
