name: Gallery Auto-Update Scraper

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Gallery
        uses: actions/checkout@v4
        with:
          path: gallery-dir

      - name: Checkout Scraper
        uses: actions/checkout@v4
        with:
          repository: csuporj/scraper
          path: scraper-dir

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run Scraper
        working-directory: ./gallery-dir/public
        run: |
          dotnet run --project ../../scraper-dir/scraper/scraper.csproj

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: gallery-dir
          commit_message: "Auto-update: New thumbnails and albums.json"
          # 'public/*.json' matches the root file
          # 'public/**/*.jpg' matches JPGs in any subfolder
          file_pattern: "public/*.json public/**/*.jpg"
