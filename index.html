<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <title>Gallery</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 1. Immediately tell the browser to stop the "loading" process
      window.stop();

      // 2. Clear any background network "negotiations" that are hanging
      if (window.performance && window.performance.clearResourceTimings) {
        window.performance.clearResourceTimings();
      }

      // 3. Double-check after a tiny delay in case the OS 're-engaged' the spinner
      setTimeout(function () {
        window.stop();
      }, 10);
    </script>
  </body>
</html>
